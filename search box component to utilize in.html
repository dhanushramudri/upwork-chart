<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Bloomberg Search Dropdown - Settings Popup</title>
  <style>
    :root {
      --bbg-search-w: 360px;
      --bbg-search-h: 34px;

      --bbg-panel-w-3: 700px;
      --bbg-panel-w-4: 860px;
      --bbg-panel-w-5: 1040px;
      --bbg-panel-w-6: 1200px;
      --bbg-panel-w-7: 1360px;
      --bbg-panel-w-8: 1580px;
      --bbg-panel-w-9: 1680px;
      --bbg-viewport-w: 100vw;
      --bbg-current-panel-w: min(var(--bbg-panel-w-3), var(--bbg-viewport-w));

      --bbg-empty-h: 58px;
      --bbg-compact-h: 126px;
      --bbg-expanded-h: 270px;
      --bbg-no-results-h: 140px;
      --bbg-filtered-h: var(--bbg-compact-h);
      --bbg-current-panel-h: var(--bbg-compact-h);

      --bbg-panel-open-ms: 232ms;
      --bbg-panel-close-ms: 118ms;
      --bbg-panel-resize-ms: 186ms;
      --bbg-panel-open-ease: cubic-bezier(.22, .61, .36, 1);
      --bbg-panel-close-ease: cubic-bezier(.55, .06, .68, .19);

      --bbg-input-delay: 82ms;
      --bbg-input-ms: 78ms;
      --bbg-columns-delay: 118ms;
      --bbg-columns-ms: 86ms;
      --bbg-links-delay: 142ms;
      --bbg-links-ms: 88ms;

      --panel: #000000;
      --panel-alt: #0b1016;
      --panel-soft: #111821;
      --panel-line: #2b3540;
      --panel-line-strong: #4b5968;
      --text: #ffffff;
      --muted: #a8b2be;
      --gold: #f2d37b;
      --blue: #9dccff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .preview-stage {
      position: relative;
      width: 100vw;
      max-width: 100vw;
      min-height: calc(var(--bbg-search-h) + var(--bbg-expanded-h) + 310px);
      overflow: visible;
      background: #fff;
    }

    .bbg-search {
      position: relative;
      width: var(--bbg-current-panel-w);
      max-width: 100vw;
      height: var(--bbg-search-h);
      overflow: visible;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      z-index: 100;
      transition: width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease);
    }

    .bbg-search.cols-3 { --bbg-current-panel-w: min(var(--bbg-panel-w-3), var(--bbg-viewport-w)); }
    .bbg-search.cols-4 { --bbg-current-panel-w: min(var(--bbg-panel-w-4), var(--bbg-viewport-w)); }
    .bbg-search.cols-5 { --bbg-current-panel-w: min(var(--bbg-panel-w-5), var(--bbg-viewport-w)); }
    .bbg-search.cols-6 { --bbg-current-panel-w: min(var(--bbg-panel-w-6), var(--bbg-viewport-w)); }
    .bbg-search.cols-7 { --bbg-current-panel-w: min(var(--bbg-panel-w-7), var(--bbg-viewport-w)); }
    .bbg-search.cols-8 { --bbg-current-panel-w: min(var(--bbg-panel-w-8), var(--bbg-viewport-w)); }
    .bbg-search.cols-9 { --bbg-current-panel-w: min(var(--bbg-panel-w-9), var(--bbg-viewport-w)); }

    .bbg-search.is-compact { --bbg-current-panel-h: var(--bbg-compact-h); }
    .bbg-search.is-expanded { --bbg-current-panel-h: var(--bbg-expanded-h); }
    .bbg-search.is-expanded.is-filtering { --bbg-current-panel-h: var(--bbg-filtered-h); }
    .bbg-search.is-no-results { --bbg-current-panel-h: var(--bbg-no-results-h); }

    .bbg-search *,
    .bbg-search *::before,
    .bbg-search *::after {
      box-sizing: border-box;
    }

    .bbg-search__trigger {
      position: relative;
      z-index: 20;
      width: var(--bbg-search-w);
      height: var(--bbg-search-h);
      margin: 0;
      padding: 0 28px 0 30px;
      border: 0;
      border-radius: 0;
      outline: 0;
      background: #000;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 39px;
      font-weight: 400;
      text-align: left;
    }

    .bbg-search__trigger svg {
      display: block;
      width: 17px;
      height: 17px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .bbg-search__trigger-label {
      display: inline-block;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

        .bbg-search__scope-bar {
      position: absolute;
      left: calc(var(--bbg-search-w) + 14px);
      top: 0;
      z-index: 24;
      height: var(--bbg-search-h);
      width: 340px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid rgba(242,211,123,0.58);
      background:
        radial-gradient(circle at 50% 0%, rgba(242,211,123,0.20) 0%, rgba(242,211,123,0.00) 58%),
        linear-gradient(180deg, #111a26 0%, #05080c 100%);
      color: #d5dde8;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.88),
        0 0 0 1px rgba(0,0,0,0.78),
        0 0 16px rgba(242,211,123,0.20),
        0 6px 16px rgba(0,0,0,0.40);
      font-family: Arial, Helvetica, sans-serif;
      white-space: nowrap;
    }

    .bbg-search__scope-title {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .bbg-search__scope-title::after {
      content: "";
    }

    .bbg-search__scope-control {
      position: relative;
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 326px;
      height: 31px;
      padding: 3px;
      border: 1px solid #5f6d7b;
      background:
        linear-gradient(180deg, #030507 0%, #0b131d 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.90),
        0 0 0 1px rgba(0,0,0,0.76);
      overflow: hidden;
    }

    .bbg-search__scope-control::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 158px;
      height: 23px;
      background:
        linear-gradient(180deg, #fff4b9 0%, #ebcc6e 42%, #c79825 100%);
      border: 1px solid rgba(255,255,255,0.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.46),
        inset 0 -1px 0 rgba(91,60,0,0.40),
        0 0 14px rgba(242,211,123,0.32);
      transform: translateX(0);
      transition: transform 108ms var(--bbg-panel-open-ease);
    }

    .bbg-search[data-scope="stocks"] .bbg-search__scope-control::before {
      transform: translateX(0);
    }

    .bbg-search[data-scope="all"] .bbg-search__scope-control::before {
      transform: translateX(158px);
    }

    .bbg-search__scope-option {
      position: relative;
      z-index: 1;
      min-width: 0;
      width: 158px;
      height: 23px;
      margin: 0;
      padding: 0 12px;
      border: 0;
      border-radius: 0;
      outline: 0;
      background: transparent;
      color: #dbe6f2;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12.2px;
      line-height: 23px;
      font-weight: 950;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      text-align: center;
      transition:
        color 80ms linear,
        text-shadow 80ms linear;
    }

    .bbg-search__scope-option + .bbg-search__scope-option {
      border-left: 1px solid rgba(255,255,255,0.10);
    }

    .bbg-search__scope-option:hover {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(157,204,255,0.45);
    }

    .bbg-search__scope-option:focus-visible {
      outline: 1px solid rgba(242,211,123,0.95);
      outline-offset: 1px;
    }

    .bbg-search__scope-option.is-active,
    .bbg-search[data-scope="stocks"] .bbg-search__scope-option[data-scope="stocks"],
    .bbg-search[data-scope="all"] .bbg-search__scope-option[data-scope="all"] {
      color: #040609;
      text-shadow: 0 1px 0 rgba(255,255,255,0.34);
    }

    .bbg-search[data-scope="stocks"] .bbg-search__scope-bar {
      border-color: rgba(242,211,123,0.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(242,211,123,0.22),
        0 0 0 1px rgba(0,0,0,0.76),
        0 0 18px rgba(242,211,123,0.25),
        0 6px 16px rgba(0,0,0,0.40);
    }

    .bbg-search[data-scope="stocks"] .bbg-search__trigger svg {
      stroke: var(--gold);
    }

.bbg-search__shell {
      position: absolute;
      left: 0;
      top: var(--bbg-search-h);
      z-index: 10;
      width: var(--bbg-current-panel-w);
      max-width: 100vw;
      height: 0;
      overflow: visible;
      visibility: hidden;
      pointer-events: none;
      transition:
        width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        height var(--bbg-panel-close-ms) var(--bbg-panel-close-ease),
        visibility 0ms linear var(--bbg-panel-close-ms);
    }

    .bbg-search.is-open .bbg-search__shell {
      height: var(--bbg-current-panel-h);
      visibility: visible;
      pointer-events: auto;
      transition:
        width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        height var(--bbg-panel-open-ms) var(--bbg-panel-open-ease),
        visibility 0ms linear 0ms;
    }

    .bbg-search.is-open.is-resizing .bbg-search__shell {
      transition:
        width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        height var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        visibility 0ms linear 0ms;
    }

    .bbg-search__mask {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .bbg-search__inner {
      width: var(--bbg-current-panel-w);
      max-width: 100vw;
      min-height: 0;
      background: #000;
      color: #fff;
      padding: 20px 20px 15px 20px;
      transform: translateY(-7px);
      transition:
        width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        transform var(--bbg-panel-close-ms) var(--bbg-panel-close-ease);
    }

    .bbg-search.is-open .bbg-search__inner {
      transform: translateY(0);
      transition:
        width var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        transform var(--bbg-panel-open-ms) var(--bbg-panel-open-ease);
    }

    .bbg-search__input-row,
    .bbg-search__column-title,
    .bbg-search__result,
    .bbg-search__footer,
    .bbg-search__status {
      opacity: 0;
    }

    .bbg-search__input-row {
      position: relative;
      height: 30px;
      padding-right: 132px;
      transform: translateY(-3px);
      transition:
        opacity var(--bbg-input-ms) linear,
        transform 104ms var(--bbg-panel-open-ease);
    }

    .bbg-search__input {
      display: block;
      width: 100%;
      height: 29px;
      margin: 0;
      padding: 0 0 8px 1px;
      border: 0;
      border-bottom: 1px solid #c9c9c9;
      border-radius: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 29px;
      font-weight: 400;
    }

    .bbg-search__input::placeholder {
      color: #a8a8a8;
      opacity: 1;
    }



    .bbg-search__settings,
    .bbg-search__plus,
    .bbg-search__close {
      position: absolute;
      top: -6px;
      width: 38px;
      height: 38px;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
    }

    .bbg-search__settings { right: 65px; }
    .bbg-search__plus { right: 31px; }
    .bbg-search__close { right: -3px; }

    .bbg-search__settings svg {
      position: absolute;
      left: 7px;
      top: 7px;
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bbg-search__settings:hover svg,
    .bbg-search.is-settings-open .bbg-search__settings svg {
      stroke: var(--blue);
    }

    .bbg-search__plus::before,
    .bbg-search__plus::after,
    .bbg-search__close::before,
    .bbg-search__close::after {
      content: "";
      position: absolute;
      left: 18px;
      top: 5px;
      width: 2px;
      height: 30px;
      background: #fff;
      transform-origin: center;
    }

    .bbg-search__plus::before { transform: rotate(90deg); }
    .bbg-search__plus::after { transform: rotate(0deg); }
    .bbg-search__close::before { transform: rotate(45deg); }
    .bbg-search__close::after { transform: rotate(-45deg); }

    .bbg-search__plus:hover::before,
    .bbg-search__plus:hover::after,
    .bbg-search__close:hover::before,
    .bbg-search__close:hover::after {
      background: var(--blue);
    }

    .bbg-search.is-max-columns .bbg-search__plus {
      cursor: default;
    }

    .bbg-search.is-max-columns .bbg-search__plus::before,
    .bbg-search.is-max-columns .bbg-search__plus::after,
    .bbg-search.is-max-columns .bbg-search__plus:hover::before,
    .bbg-search.is-max-columns .bbg-search__plus:hover::after {
      background: #6d6d6d;
    }

    .bbg-search__columns {
      display: grid;
      grid-template-columns: repeat(var(--rendered-cols, var(--visible-cols, 3)), minmax(190px, 235px));
      justify-content: start;
      column-gap: 18px;
      margin-top: 18px;
      transition:
        column-gap var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease),
        grid-template-columns var(--bbg-panel-resize-ms) var(--bbg-panel-open-ease);
    }

    .bbg-search[data-scope="stocks"] .bbg-search__columns {
      margin-top: 12px;
    }

    .bbg-search.cols-4 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 4), minmax(185px, 225px));
      column-gap: 18px;
    }

    .bbg-search.cols-5 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 5), minmax(170px, 210px));
      column-gap: 15px;
    }

    .bbg-search.cols-6 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 6), minmax(155px, 195px));
      column-gap: 14px;
    }

    .bbg-search.cols-7 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 7), minmax(150px, 190px));
      column-gap: 14px;
    }

    .bbg-search.cols-8 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 8), minmax(135px, 175px));
      column-gap: 13px;
    }

    .bbg-search.cols-9 .bbg-search__columns {
      grid-template-columns: repeat(var(--rendered-cols, 9), minmax(125px, 165px));
      column-gap: 12px;
    }

    .bbg-search.cols-5 .bbg-search__column-title,
    .bbg-search.cols-6 .bbg-search__column-title,
    .bbg-search.cols-7 .bbg-search__column-title,
    .bbg-search.cols-8 .bbg-search__column-title,
    .bbg-search.cols-9 .bbg-search__column-title {
      font-size: 12.5px;
      letter-spacing: -0.01em;
    }

    .bbg-search.cols-6 .bbg-search__column-title {
      font-size: 11.8px;
    }

    .bbg-search.cols-7 .bbg-search__column-title {
      font-size: 11.2px;
    }

    .bbg-search.cols-5 .bbg-search__result button,
    .bbg-search.cols-6 .bbg-search__result button,
    .bbg-search.cols-7 .bbg-search__result button,
    .bbg-search.cols-8 .bbg-search__result button,
    .bbg-search.cols-9 .bbg-search__result button {
      font-size: 14px;
    }

    .bbg-search.cols-6 .bbg-search__result button {
      font-size: 13.2px;
    }

    .bbg-search.cols-7 .bbg-search__result button {
      font-size: 12.6px;
    }

    .bbg-search.cols-5 .bbg-search__result small,
    .bbg-search.cols-6 .bbg-search__result small,
    .bbg-search.cols-7 .bbg-search__result small,
    .bbg-search.cols-8 .bbg-search__result small,
    .bbg-search.cols-9 .bbg-search__result small {
      font-size: 10.6px;
    }

    .bbg-search.cols-6 .bbg-search__result small {
      font-size: 9.9px;
    }

    .bbg-search.cols-7 .bbg-search__result small {
      font-size: 9.4px;
    }

    .bbg-search__column-title {
      margin: 0 0 10px;
      padding: 0 0 4px;
      border-bottom: 1px dotted rgba(255, 255, 255, .42);
      color: #fff;
      font-size: 14px;
      line-height: 18px;
      font-weight: 800;
      text-shadow: 1px 1px 0 #004eff;
      transform: translateY(-2px);
      transition:
        opacity var(--bbg-columns-ms) linear,
        transform 106ms var(--bbg-panel-open-ease);
    }


    .bbg-search__result {
      margin: 0 0 9px;
      color: #fff;
      transform: translateY(-2px);
      transition:
        opacity var(--bbg-links-ms) linear,
        transform 108ms var(--bbg-panel-open-ease);
    }

    .bbg-search__result button {
      display: block;
      width: 100%;
      max-width: 100%;
      color: #fff;
      background: transparent;
      border: 0;
      padding: 0;
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15.5px;
      line-height: 18px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bbg-search__result button:hover,
    .bbg-search__result.is-active button {
      color: var(--blue);
      text-decoration: underline;
    }

    .bbg-search__result-main {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bbg-search__result small {
      display: block;
      margin-top: 2px;
      max-width: 100%;
      color: #b7b7b7;
      font-size: 11.5px;
      line-height: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bbg-search__result mark {
      background: transparent;
      color: var(--gold);
      font-weight: inherit;
    }


    .bbg-search__status {
      display: none !important;
    }

    .bbg-search__footer,
    .bbg-search__status {
      margin-top: 7px;
      color: #a8a8a8;
      font-size: 11px;
      line-height: 14px;
      transform: translateY(-2px);
      transition:
        opacity var(--bbg-links-ms) linear,
        transform 108ms var(--bbg-panel-open-ease);
    }

    .bbg-search__footer {
      display: none;
      padding-top: 7px;
      border-top: 1px dotted rgba(255,255,255,.24);
      color: #d8d8d8;
      cursor: pointer;
    }

    .bbg-search__footer.is-visible {
      display: block;
    }

    .bbg-search__footer:hover {
      color: var(--blue);
      text-decoration: underline;
    }

    .bbg-search.is-compact .bbg-search__status {
      display: none;
    }

    .bbg-search.is-open .bbg-search__input-row {
      opacity: 1;
      transform: translateY(0);
      transition-delay: var(--bbg-input-delay), var(--bbg-input-delay);
    }

    .bbg-search.is-open .bbg-search__column-title {
      opacity: 1;
      transform: translateY(0);
      transition-delay: var(--bbg-columns-delay), var(--bbg-columns-delay);
    }

    .bbg-search.is-open .bbg-search__result,
    .bbg-search.is-open .bbg-search__footer,
    .bbg-search.is-open .bbg-search__status {
      opacity: 1;
      transform: translateY(0);
      transition-delay: var(--bbg-links-delay), var(--bbg-links-delay);
    }

    .bbg-search.is-closing .bbg-search__input-row,
    .bbg-search.is-closing .bbg-search__column-title,
    .bbg-search.is-closing .bbg-search__result,
    .bbg-search.is-closing .bbg-search__footer,
    .bbg-search.is-closing .bbg-search__status {
      opacity: 0;
      transform: translateY(-2px);
      transition-delay: 0ms, 0ms;
      transition-duration: 34ms, 70ms;
    }

    .bbg-search__notch {
      position: absolute;
      left: 121px;
      bottom: -5px;
      width: 0;
      height: 0;
      opacity: 0;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 5px solid #000;
      pointer-events: none;
    }

    .bbg-search.is-settled .bbg-search__notch {
      opacity: 1;
    }

    /* Settings popup */
    .settings-popup {

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
    }

    function initials(text) {
      return String(text || "")
        .split(/[^A-Za-z0-9]+/)
        .filter(Boolean)
        .map(part => part[0])
        .join("")
        .toLowerCase();
    }

    function subsequenceScore(query, text) {
      let qi = 0;
      let gaps = 0;
      const q = normalize(query).replace(/\s+/g, "");
      const t = normalize(text).replace(/\s+/g, "");

      for (let i = 0; i < t.length && qi < q.length; i++) {
        if (t[i] === q[qi]) qi++;
        else if (qi > 0) gaps++;
      }

      if (qi !== q.length || !q.length) return 0;
      return Math.max(4, 20 - gaps);
    }

    function scoreItem(item, query) {
      const q = normalize(query);
      if (!q) return item.default ? 100 : 0;

      const label = normalize(item.label);
      const meta = normalize(item.meta);
      const value = normalize(item.value);
      const keywords = normalize(item.keywords);
      const qParts = q.split(/\s+/).filter(Boolean);
      const isShortQuery = q.length <= 3;
      const isMultiTermQuery = qParts.length > 1;

      function words(value) {
        return normalize(value).split(/\s+/).filter(Boolean);
      }

      function tokenStarts(value, part) {
        return words(value).some(word => word.startsWith(part));
      }

      function tokenEquals(value, part) {
        return words(value).some(word => word === part);
      }

      function visibleTokenEquals(part) {
        return tokenEquals(item.label, part) || tokenEquals(item.value, part) || tokenEquals(item.meta, part);
      }

      function visibleTokenStarts(part) {
        return tokenStarts(item.label, part) || tokenStarts(item.value, part) || tokenStarts(item.meta, part);
      }

      function identityTokenStarts(part) {
        return tokenStarts(item.label, part) || tokenStarts(item.value, part);
      }

      function visibleTermMatches(part, index) {
        if (!part) return true;

        /*
          Multi-word search must behave like an AND search.
          For completed terms, require an exact visible token match.
          For the last typed term, allow prefix matching only against the primary
          identity fields: label/value. This prevents "mark c" from matching
          "Mark Green" via metadata like "Congressional" or "Mark Zuckerberg"
          via metadata like "CEO".
        */
        if (visibleTokenEquals(part)) return true;

        const isLastPart = index === qParts.length - 1;
        if (isLastPart && part.length >= 1 && identityTokenStarts(part)) return true;

        return false;
      }

      /*
        Critical multi-word guard:
        Every visible term must be represented. Without this, "mark cuban"
        matches unrelated "Market" rows because "mark" is a prefix of "market".
      */
      if (isMultiTermQuery && !qParts.every((part, index) => visibleTermMatches(part, index))) {
        return 0;
      }

      let visibleScore = 0;
      let keywordScore = 0;

      /*
        Hard visibility rule:
        A result can ONLY appear if the query strongly matches visible text:
        label, value, or meta.

        Hidden keywords may improve ranking AFTER a visible match exists,
        but hidden keywords can never make a category/column survive by
        themselves.
      */

      if (label === q || value === q) visibleScore += 1200;
      if (label.startsWith(q) || value.startsWith(q)) visibleScore += 850;
      if (tokenStarts(item.label, q) || tokenStarts(item.value, q)) visibleScore += 760;

      if (!isShortQuery && (label.includes(q) || value.includes(q))) visibleScore += 440;

      if (meta === q) visibleScore += 520;
      if (tokenStarts(item.meta, q)) visibleScore += 420;

      /*
        For short queries, do NOT use arbitrary substring matching inside meta.
        Example: "tim" should match "Tim Cook" but not unrelated text that
        happens to contain those letters.
      */
      if (!isShortQuery && meta.includes(q)) visibleScore += 240;

      qParts.forEach((part, index) => {
        if (!part) return;

        if (tokenEquals(item.label, part) || tokenEquals(item.value, part)) visibleScore += 260;
        else if (tokenStarts(item.label, part) || tokenStarts(item.value, part)) visibleScore += 180;

        if (tokenEquals(item.meta, part)) visibleScore += 150;
        else if (tokenStarts(item.meta, part)) visibleScore += 95;

        /*
          In multi-word queries, keyword matches should only boost rows that
          already passed the visible AND guard above. They should never create
          broad unrelated category matches.
        */
        if (!isShortQuery && part.length >= 4 && keywords.includes(part)) keywordScore += isMultiTermQuery ? 8 : 18;
      });

      /*
        Initials and subsequence matching are useful for longer single-phrase searches,
        but too loose for multi-word proper-name searches like "mark cuban".
      */
      if (!isShortQuery && !isMultiTermQuery) {
        if (initials(item.meta).startsWith(q) || initials(item.label).startsWith(q)) visibleScore += 160;
        visibleScore += Math.min(80, subsequenceScore(q, `${item.label} ${item.meta}`));
        if (keywords.includes(q)) keywordScore += 45;
      } else if (!isShortQuery && isMultiTermQuery) {
        if (label.includes(q) || value.includes(q) || meta.includes(q)) visibleScore += 180;
        if (keywords.includes(q)) keywordScore += 20;
      }

      if (visibleScore <= 0) return 0;

      /*
        Minimum visible threshold:
        - Short queries must be a token-start/direct visible match.
        - Longer queries can pass with visible substring/phrase matches.
      */
      if (isShortQuery && visibleScore < 90) return 0;
      if (!isShortQuery && visibleScore < 60) return 0;

      return visibleScore + keywordScore;
    }


    function highlight(text, query) {
      const raw = String(text || "");
      const q = String(query || "").trim();

      if (!q) return escapeHtml(raw);

      const parts = q
        .split(/\s+/)
        .filter(part => part.length >= 1)
        .sort((a, b) => b.length - a.length)
        .map(part => part.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));

      if (!parts.length) return escapeHtml(raw);

      const re = new RegExp(`(${parts.join("|")})`, "ig");
      return escapeHtml(raw).replace(re, "<mark>$1</mark>");
    }

    function getStocksOnlyUniverseMatches(query) {
      const ticker = normalizeTickerSymbol(query);
      const q = normalize(query);
      if (!ticker && !q) return [];

      const combined = [
        ...DATA.filter(item => item.column === "Stocks"),
        ...STOCK_UNIVERSE
      ];

      const seen = new Set();

      return combined
        .map(item => normalizeStockResult(item, ticker || query))
        .filter(item => {
          if (!item.label || seen.has(item.label)) return false;
          seen.add(item.label);

          const label = normalizeTickerSymbol(item.label);
          const meta = normalize(item.meta);
          const raw = normalize(`${item.label} ${item.meta} ${item.exchange}`);

          return label.startsWith(ticker) ||
            label.includes(ticker) ||
            meta.startsWith(q) ||
            raw.includes(q);
        })
        .map(item => {
          const label = normalizeTickerSymbol(item.label);
          const exact = label === ticker;
          const starts = label.startsWith(ticker);
          return {
            ...item,
            score: exact ? 2000 : starts ? 1200 : 800

        .sort((a, b) => b.score - a.score || a.label.localeCompare(b.label));

        root.style.setProperty("--visible-cols", 3);
        if (!input || !input.value.trim()) {
          root.style.setProperty("--rendered-cols", visibleCols);
          root.dataset.renderedColumns = String(visibleCols);
        }

        syncPlusButtonState(input ? input.value : "");

        if (isOpen) flagResizing();
        return;
      }

      const safeCapacity = Math.max(1, Math.min(capacity, getAllMarketsColumnCapacity()));
      visibleColumnCount = Math.max(1, Math.min(count, safeCapacity));
      allMarketsVisibleColumnCount = visibleColumnCount;

      const visibleCols = getVisibleColumns().length;

      root.classList.remove("cols-3", "cols-4", "cols-5", "cols-6", "cols-7", "cols-8", "cols-9");
      root.classList.add(`cols-${Math.min(7, Math.max(3, visibleCols))}`);
      root.style.setProperty("--visible-cols", visibleCols);
      if (!input || !input.value.trim()) {
        root.style.setProperty("--rendered-cols", visibleCols);
        root.dataset.renderedColumns = String(visibleCols);
      }

      syncPlusButtonState(input ? input.value : "");

      if (isOpen) flagResizing();
    }

    function flagResizing() {
      if (root.classList.contains("is-scope-switching")) return;

      root.classList.add("is-resizing");
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => root.classList.remove("is-resizing"), 220);
    }

    function updateFilteredHeight(hasQuery, hasResults) {
      if (!hasQuery || !hasResults) {
        root.style.removeProperty("--bbg-filtered-h");
        return;
      }

      const inputRowHeight = 26;
      const topPadding = 16;
      const bottomPadding = 12;
      const columnsTopMargin = 14;
      const hasVisibleColumnTitle = Array.from(columnsRoot.querySelectorAll(".bbg-search__column-title")).length > 0;
      const titleBlockHeight = hasVisibleColumnTitle ? 26 : 0;
      const rowHeight = isStocksOnlyMode() ? 32 : 38;
      const footerHeight = footer.classList.contains("is-visible") ? 22 : 0;
      const safetyPadding = 8;

      const resultRows = Array.from(columnsRoot.querySelectorAll(".bbg-search__column"))
        .map(column => column.querySelectorAll(".bbg-search__result").length);

      const maxRows = Math.max(1, ...resultRows);
      const neededHeight = topPadding
        + inputRowHeight
        + columnsTopMargin
        + titleBlockHeight
        + (maxRows * rowHeight)
        + footerHeight
        + bottomPadding
        + safetyPadding;

      const minimumHeight = 116;
      const maximumHeight = 270;
      const adaptiveHeight = Math.max(minimumHeight, Math.min(maximumHeight, Math.ceil(neededHeight)));

      root.style.setProperty("--bbg-filtered-h", `${adaptiveHeight}px`);
    }

    function getScoredResults(query) {
      const hasQuery = query.trim().length > 0;
      const searchColumns = getSearchColumns(query);

      if (!hasQuery) {
        currentTotalMatches = 0;
        return [];
      }

      const scored = DATA
        .filter(item => searchColumns.includes(item.column))
        .map(item => ({ ...item, score: scoreItem(item, query) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.label.localeCompare(b.label));

      currentTotalMatches = scored.length;
      return scored;
    }

    function renderStocksOnlyDirectResult(cleanQuery) {
      root.classList.remove("is-empty-query");

      const stockItems = getStocksOnlyResults(cleanQuery);
      currentResults = [];
      activeIndex = -1;
      currentTotalMatches = stockItems.length;

      root.classList.remove("cols-4", "cols-5", "cols-6", "cols-7", "cols-8", "cols-9");
      root.classList.add("cols-3");
      root.style.setProperty("--visible-cols", 3);
      root.style.setProperty("--rendered-cols", 1);
      root.dataset.renderedColumns = "1";
      root.classList.add("is-filtering");
      syncPlusButtonState();

      if (!stockItems.length) {
        columnsRoot.innerHTML = "";
        root.style.setProperty("--rendered-cols", 1);
        root.dataset.renderedColumns = "1";
        setMode("no-results");
        footer.classList.remove("is-visible");
        footer.textContent = "";
        status.textContent = "";
        updateFilteredHeight(true, false);
        renderSettingsLists();
        return;
      }

      setMode("expanded");

      columnsRoot.innerHTML = `
        <div class="bbg-search__column" data-column="Stocks">
          ${stockItems.map(item => {
            const index = currentResults.push(item) - 1;
            return `
              <p class="bbg-search__result is-stock-quote" data-result-index="${index}">
                <button type="button" data-value="${escapeHtml(item.value)}">
                  ${renderStockQuoteRow(item, cleanQuery)}
                </button>
              </p>
            `;
          }).join("")}
        </div>
      `;

      footer.classList.remove("is-visible");
      footer.textContent = "";
      status.textContent = "";
      updateFilteredHeight(true, true);

      const resultNodes = Array.from(columnsRoot.querySelectorAll(".bbg-search__result"));
      resultNodes.forEach(node => {
        const button = node.querySelector("button");
        button.addEventListener("click", () => {
          const index = Number(node.dataset.resultIndex);
          const item = Number.isFinite(index) ? currentResults[index] : null;
          const displayValue = item?.label || button.textContent.trim();
          const submitValue = item?.value || displayValue;

          input.value = displayValue;
          renderResults(displayValue);
          submitSearch(submitValue);
        });
      });

      renderSettingsLists();
    }


    function renderResults(query = "") {
      const cleanQuery = String(query || "").trim();
      const hasQuery = cleanQuery.length > 0;

      if (!hasQuery) {
        currentResults = [];
        activeIndex = -1;
        currentTotalMatches = 0;

        columnsRoot.innerHTML = "";
        footer.classList.remove("is-visible");
        footer.textContent = "";
        status.textContent = "";

        root.classList.add("is-empty-query");
        root.classList.remove("is-filtering");
        root.style.removeProperty("--bbg-filtered-h");
        root.style.setProperty("--rendered-cols", 0);
        root.dataset.renderedColumns = "0";

        setMode("compact");
        syncPlusButtonState("");
        renderSettingsLists();
        return;
      }

      root.classList.remove("is-empty-query");

      if (isStocksOnlyMode()) {
        renderStocksOnlyDirectResult(cleanQuery);
        return;
      }

      const visibleColumns = getVisibleColumns();
      const searchColumns = getSearchColumns(cleanQuery);
      let results = hasQuery && isStocksOnlyMode()
        ? getStocksOnlyResults(cleanQuery)
        : getScoredResults(cleanQuery);

      if (hasQuery && isStocksOnlyMode()) {
        currentTotalMatches = results.length;
      }

      currentResults = [];
      activeIndex = -1;

      if (!hasQuery) setMode("compact");
      else if (results.length === 0) setMode("no-results");
      else setMode("expanded");

      const grouped = new Map(searchColumns.map(column => [column, []]));
      results.forEach(item => {
        if (!grouped.has(item.column)) grouped.set(item.column, []);
        grouped.get(item.column).push(item);
      });

      /*
        Persistent preview rule:
        Empty input:
          Render the normal visible active-tab layout.
        Typed input + All Markets:
          Search the full dataset, but render up to the same visibleColumnCount
          that would have been active if the user pressed + before typing.
        Typed input + Stocks Only:
          Search and render Stocks only.
      */
      const matchingColumns = hasQuery
        ? getFilteredMatchingColumns(cleanQuery, grouped)
        : visibleColumns;

      const selectedPreviewColumnCount = hasQuery
        ? (isStocksOnlyMode() ? 1 : Math.max(1, Math.min(visibleColumnCount, MAX_VISIBLE_COLUMNS, matchingColumns.length)))
        : getVisibleColumns().length;

      const renderedColumns = hasQuery
        ? matchingColumns.slice(0, selectedPreviewColumnCount)
        : matchingColumns;

      const matchingCategoryCount = hasQuery ? matchingColumns.length : renderedColumns.length;
      const hiddenCategoryCount = Math.max(0, matchingCategoryCount - renderedColumns.length);
      const renderedCount = Math.max(1, renderedColumns.length);
      const panelColumnCount = hasQuery
        ? Math.max(3, renderedColumns.length || 1)
        : Math.max(3, getVisibleColumns().length);

      root.classList.remove("cols-3", "cols-4", "cols-5", "cols-6", "cols-7", "cols-8", "cols-9");
      root.classList.add(`cols-${Math.min(7, panelColumnCount)}`);
      root.style.setProperty("--visible-cols", panelColumnCount);
      root.style.setProperty("--rendered-cols", renderedCount);
      root.dataset.renderedColumns = String(renderedCount);
      root.classList.toggle("is-filtering", hasQuery);
      syncPlusButtonState(cleanQuery);

      columnsRoot.innerHTML = renderedColumns.map(column => {
        const limit = hasQuery ? MAX_ROWS_PER_COLUMN : 1;
        const items = (grouped.get(column) || []).slice(0, limit);
        const columnTitleMarkup = shouldRenderColumnTitle(column)
          ? `<h3 class="bbg-search__column-title">${escapeHtml(column)}</h3>`
          : "";

        return `
          <div class="bbg-search__column" data-column="${escapeHtml(column)}">
            ${columnTitleMarkup}
            ${items.map(item => {
              const index = currentResults.push(item) - 1;
              const useStockQuoteRow = shouldRenderStockQuoteRow(column, item);

              return `
                <p class="bbg-search__result${useStockQuoteRow ? " is-stock-quote" : ""}" data-result-index="${index}">
                  <button type="button" data-value="${escapeHtml(item.value)}">
                    ${useStockQuoteRow ? renderStockQuoteRow(item, cleanQuery) : renderResultLabel(item, cleanQuery)}
                  </button>
                  ${useStockQuoteRow ? "" : `<small>${highlight(item.meta, cleanQuery)}</small>`}
                </p>
              `;
            }).join("")}
          </div>
        `;
      }).join("");

      const visibleResults = currentResults.length;
      const hiddenResults = Math.max(0, currentTotalMatches - visibleResults);

      footer.classList.toggle("is-visible", hasQuery && (hiddenCategoryCount > 0 || hiddenResults > 0 || visibleResults >= MAX_ROWS_PER_COLUMN));
      if (hiddenCategoryCount > 0) {
        footer.textContent = `Showing ${renderedColumns.length} of ${matchingCategoryCount} matching categor${matchingCategoryCount === 1 ? "y" : "ies"} — press + to preview more`;
      } else if (hiddenResults > 0) {
        footer.textContent = `${hiddenResults} more result${hiddenResults === 1 ? "" : "s"} available — press Enter for full search`;
      } else {
        footer.textContent = "View all results →";
      }

      status.textContent = "";
      updateFilteredHeight(hasQuery, results.length > 0);

      const resultNodes = Array.from(columnsRoot.querySelectorAll(".bbg-search__result"));
      resultNodes.forEach(node => {
        const button = node.querySelector("button");
        button.addEventListener("click", () => {
          const index = Number(node.dataset.resultIndex);
          const item = Number.isFinite(index) ? currentResults[index] : null;
          const displayValue = item?.label || button.textContent.trim();
          const submitValue = item?.value || displayValue;

          input.value = displayValue;
          renderResults(displayValue);
          submitSearch(submitValue);
        });
      });

      renderSettingsLists();
    }

    function setActive(index) {
      const nodes = Array.from(columnsRoot.querySelectorAll(".bbg-search__result"));
      nodes.forEach(node => node.classList.remove("is-active"));

      if (!nodes.length) {
        activeIndex = -1;
        return;
      }

      activeIndex = Math.max(0, Math.min(index, nodes.length - 1));
      nodes[activeIndex].classList.add("is-active");
    }

    function clearTimers() {
      if (settleTimer) clearTimeout(settleTimer);
      if (closeTimer) clearTimeout(closeTimer);
      settleTimer = null;
      closeTimer = null;
    }

    function openSearch(focus = true) {
      clearTimers();
      root.classList.remove("is-closing", "is-settled");

      requestAnimationFrame(() => {
        root.classList.add("is-open");
        trigger.setAttribute("aria-expanded", "true");
        isOpen = true;

        settleTimer = setTimeout(() => {
          root.classList.add("is-settled");
          if (focus) input.focus();
        }, 218);
      });
    }

    function closeSearch(focus = false) {
      clearTimers();
      root.classList.add("is-closing");
      root.classList.remove("is-open", "is-settled", "is-resizing", "is-settings-open");
      trigger.setAttribute("aria-expanded", "false");
      isOpen = false;

      closeTimer = setTimeout(() => {
        root.classList.remove("is-closing");
        if (focus) trigger.focus();
      }, 128);
    }

    function submitSearch(value) {
      const query = String(value ?? input.value).trim();

      root.dispatchEvent(new CustomEvent("institutional-search:submit", {
        bubbles: true,
        detail: {
          query,
          selected: currentResults[activeIndex] || null,
          visibleColumns: getVisibleColumns(),
          searchColumns: getSearchColumns(query),
          activeTabs: [...activeTabs],
          scope: searchScope,
          totalMatches: currentTotalMatches
        }
      }));

      console.log("Search submitted:", query);
      status.textContent = "";
    }

    function getAvailableTabs() {
      return ALL_TABS.filter(tab => !activeTabs.includes(tab));
    }

    function renderSettingsLists() {
      if (!activeList || !availableList) return;

      const availableTabs = getAvailableTabs();

      activeCount.textContent = activeTabs.length;
      availableCount.textContent = availableTabs.length;

      activeList.innerHTML = activeTabs.map((tab, index) => {
        const locked = LOCKED_TABS.has(tab);
        const tag = locked ? "DEFAULT" : "DRAG";
        return `
          <button
            class="settings-item ${selectedActiveTab === tab ? "is-selected" : ""} ${locked ? "is-locked" : ""}"
            type="button"
            data-tab="${escapeHtml(tab)}"
            data-side="active"
            draggable="${locked ? "false" : "true"}"
          >
            <span class="settings-item__name">${escapeHtml(tab)}</span>
            <span class="settings-item__tag">${tag}</span>
          </button>
        `;
      }).join("");

      availableList.innerHTML = availableTabs.map(tab => `
        <button
          class="settings-item ${selectedAvailableTab === tab ? "is-selected" : ""}"
          type="button"
          data-tab="${escapeHtml(tab)}"
          data-side="available"
        >
          <span class="settings-item__name">${escapeHtml(tab)}</span>
          <span class="settings-item__tag">AVAILABLE</span>
        </button>
      `).join("");

      activeList.querySelectorAll(".settings-item").forEach(item => {
        item.addEventListener("click", () => {
          selectedActiveTab = item.dataset.tab;
          selectedAvailableTab = null;
          renderSettingsLists();
        });

        item.addEventListener("dragstart", event => {
          if (LOCKED_TABS.has(item.dataset.tab)) {
            event.preventDefault();
            return;
          }
          event.dataTransfer.setData("text/plain", item.dataset.tab);
        });

        item.addEventListener("dragover", event => event.preventDefault());

        item.addEventListener("drop", event => {
          event.preventDefault();
          const dragged = event.dataTransfer.getData("text/plain");
          const target = item.dataset.tab;
          moveActiveTabTo(dragged, activeTabs.indexOf(target));
        });
      });

      availableList.querySelectorAll(".settings-item").forEach(item => {
        item.addEventListener("click", () => {
          selectedAvailableTab = item.dataset.tab;
          selectedActiveTab = null;
          renderSettingsLists();
        });
      });

      const activeIndexForSelected = activeTabs.indexOf(selectedActiveTab);
      moveOut.disabled = !selectedActiveTab || LOCKED_TABS.has(selectedActiveTab);
      moveUp.disabled = !selectedActiveTab || activeIndexForSelected <= 1;
      moveDown.disabled = !selectedActiveTab || activeIndexForSelected < 0 || activeIndexForSelected >= activeTabs.length - 1;
      moveIn.disabled = !selectedAvailableTab;
    }

    function syncColumnsAfterSettings(message = "") {
      const capacity = getAllMarketsColumnCapacity();

      allMarketsVisibleColumnCount = Math.min(Math.max(allMarketsVisibleColumnCount, DEFAULT_VISIBLE_COLUMNS), capacity);
      visibleColumnCount = Math.min(Math.max(visibleColumnCount, DEFAULT_VISIBLE_COLUMNS), capacity);

      if (isStocksOnlyMode()) {
        setColumnCount(visibleColumnCount);
      } else {
        visibleColumnCount = allMarketsVisibleColumnCount;
        setColumnCount(visibleColumnCount, capacity);
      }

      renderResults(input.value);
      if (message) status.textContent = message;
      root.dispatchEvent(new CustomEvent("institutional-search:settings-change", {
        bubbles: true,
        detail: {
          activeTabs: [...activeTabs],
          visibleColumnCount,
          allMarketsVisibleColumnCount,
          visibleColumns: getVisibleColumns(),
          searchColumns: getSearchColumns(input.value),
          scope: searchScope
        }
      }));
    }

    function addAvailableToActive() {
      if (!selectedAvailableTab) return;
      activeTabs.push(selectedAvailableTab);
      selectedActiveTab = selectedAvailableTab;
      selectedAvailableTab = null;
      syncColumnsAfterSettings(`Added ${selectedActiveTab} to active tabs.`);
    }

    function removeActiveToAvailable() {
      if (!selectedActiveTab || LOCKED_TABS.has(selectedActiveTab)) return;
      activeTabs = activeTabs.filter(tab => tab !== selectedActiveTab);
      if (visibleColumnCount > activeTabs.length) visibleColumnCount = activeTabs.length;
      if (allMarketsVisibleColumnCount > activeTabs.length) allMarketsVisibleColumnCount = activeTabs.length;
      const removed = selectedActiveTab;
      selectedActiveTab = null;
      syncColumnsAfterSettings(`Removed ${removed} from active tabs.`);
    }

    function moveActive(delta) {
      if (!selectedActiveTab) return;
      const index = activeTabs.indexOf(selectedActiveTab);
      if (index < 0) return;

      const nextIndex = index + delta;
      if (nextIndex < 1 || nextIndex >= activeTabs.length) return;

      const copy = [...activeTabs];
      const [tab] = copy.splice(index, 1);
      copy.splice(nextIndex, 0, tab);
      activeTabs = copy;

      syncColumnsAfterSettings(`Moved ${selectedActiveTab}.`);
    }

    function moveActiveTabTo(tab, targetIndex) {
      if (!tab || LOCKED_TABS.has(tab)) return;

      const fromIndex = activeTabs.indexOf(tab);
      if (fromIndex < 0) return;

      targetIndex = Math.max(1, Math.min(targetIndex, activeTabs.length - 1));

      const copy = [...activeTabs];
      const [moved] = copy.splice(fromIndex, 1);
      copy.splice(targetIndex, 0, moved);
      activeTabs = copy;
      selectedActiveTab = moved;

      syncColumnsAfterSettings(`Moved ${moved}.`);
    }

    function resetSettings() {
      activeTabs = [...DEFAULT_ACTIVE_TABS];
      visibleColumnCount = DEFAULT_VISIBLE_COLUMNS;
      allMarketsVisibleColumnCount = DEFAULT_VISIBLE_COLUMNS;
      selectedActiveTab = null;
      selectedAvailableTab = null;
      syncColumnsAfterSettings("Search tabs reset.");
    }

    function toggleSettings() {
      if (!isOpen) openSearch(false);
      root.classList.toggle("is-settings-open");
      renderSettingsLists();
      status.textContent = "";
    }

    scopeButtons.forEach(button => {
      button.addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        setSearchScope(button.dataset.scope);
      });
    });

    trigger.addEventListener("click", event => {
      event.stopPropagation();
      isOpen ? closeSearch(false) : openSearch(true);
    });

    closeButton.addEventListener("click", event => {
      event.stopPropagation();
      closeSearch(true);
    });

    settingsButton.addEventListener("click", event => {
      event.stopPropagation();
      toggleSettings();

      root.dispatchEvent(new CustomEvent("institutional-search:settings", {
        bubbles: true,
        detail: {
          query: input.value,
          visibleColumnCount,
          allMarketsVisibleColumnCount,
          visibleColumns: getVisibleColumns(),
          searchColumns: getSearchColumns(input.value),
          activeTabs: [...activeTabs],
          scope: searchScope
        }
      }));

      input.focus();
    });

    plusButton.addEventListener("click", event => {
      event.stopPropagation();

      const query = String(input.value || "").trim();

      if (!query) {
        syncPlusButtonState("");
        status.textContent = "";
        input.focus();
        return;
      }

      const capacity = getCurrentPreviewCapacity(query);

      if (!canExpandPreview(query)) {
        syncPlusButtonState(query);
        status.textContent = "";
        input.focus();
        return;
      }

      const nextCount = Math.min(visibleColumnCount + 1, capacity);
      setColumnCount(nextCount, capacity);

      if (!isStocksOnlyMode()) {
        allMarketsVisibleColumnCount = visibleColumnCount;
      }

      renderResults(query);
      syncPlusButtonState(query);
      status.textContent = "";

      root.dispatchEvent(new CustomEvent("institutional-search:add-column", {
        bubbles: true,
        detail: {
          visibleColumnCount,
          allMarketsVisibleColumnCount,
          visibleColumns: getVisibleColumns(),
          searchColumns: getSearchColumns(query),
          scope: searchScope,
          filtering: query.length > 0,
          previewCapacity: capacity,
          canExpandFurther: canExpandPreview(query),
          matchingColumns: query.length > 0 && !isStocksOnlyMode() ? getMatchingColumnsForQuery(query) : getVisibleColumns()
        }
      }));

      input.focus();
    });

    settingsClose.addEventListener("click", event => {
      event.stopPropagation();
      root.classList.remove("is-settings-open");
      input.focus();
    });

    settingsReset.addEventListener("click", event => {
      event.stopPropagation();
      resetSettings();
    });

    moveIn.addEventListener("click", event => {
      event.stopPropagation();
      addAvailableToActive();
    });

    moveOut.addEventListener("click", event => {
      event.stopPropagation();
      removeActiveToAvailable();
    });

    moveUp.addEventListener("click", event => {
      event.stopPropagation();
      moveActive(-1);
    });

    moveDown.addEventListener("click", event => {
      event.stopPropagation();
      moveActive(1);
    });

    root.addEventListener("click", event => event.stopPropagation());

    document.addEventListener("click", () => {
      if (root.classList.contains("is-settings-open")) {
        root.classList.remove("is-settings-open");
        return;
      }
      if (isOpen) closeSearch(false);
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        if (root.classList.contains("is-settings-open")) {
          root.classList.remove("is-settings-open");
        } else if (isOpen) {
          closeSearch(true);
        }
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        openSearch(true);
      }
    });

    input.addEventListener("input", () => renderResults(input.value));

    input.addEventListener("keydown", event => {
      const nodes = Array.from(columnsRoot.querySelectorAll(".bbg-search__result"));

      if (event.key === "ArrowDown") {
        event.preventDefault();
        setActive(activeIndex + 1);
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        setActive(activeIndex <= 0 ? nodes.length - 1 : activeIndex - 1);
      }

      if (event.key === "Enter") {
        event.preventDefault();

        if (activeIndex >= 0 && currentResults[activeIndex]) {
          const selectedItem = currentResults[activeIndex];
          const displayValue = selectedItem.label || selectedItem.value || input.value;
          const submitValue = selectedItem.value || displayValue;

          input.value = displayValue;
          renderResults(displayValue);
          submitSearch(submitValue);
        } else {
          submitSearch(input.value);
        }
      }
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      submitSearch();
    });

    footer.addEventListener("click", () => submitSearch(input.value));
    footer.addEventListener("keydown", event => {
      if (event.key === "Enter") submitSearch(input.value);
    });

    updateScopeUI();
    setColumnCount(DEFAULT_VISIBLE_COLUMNS);
    renderResults("");

    window.addEventListener("load", () => {
      setTimeout(() => openSearch(false), 160);
    });
  </script>


</body></html>
